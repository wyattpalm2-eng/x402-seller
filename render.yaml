# One-click deploy blueprint for Render (free tier, no card, no SSN).
# When you're ready for a durable always-on URL:
#   1. push this folder to a free GitHub repo
#   2. render.com -> New -> Blueprint -> pick the repo -> Apply
# Render injects PORT automatically; the server reads process.env.PORT.
# PAY_TO is your PUBLIC Base address, so it's safe to bake in here for zero config.
services:
  - type: web
    name: x402-seller
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PAY_TO
        value: "0x72B944dA66263bE35c2a2eDFeF5c525d58fa53Df"
      - key: NETWORK
        value: "eip155:84532"          # testnet (known-good). Mainnet blocked: thirdweb free tier
                                        # does not support Base mainnet x402 "exact" settlement.
      - key: FACILITATOR_URL
        value: "https://x402.org/facilitator"
      # Mainnet needs a facilitator that settles Base mainnet on a free plan.
      # thirdweb server wallet (public), kept for when a working mainnet facilitator is wired:
      # THIRDWEB_SERVER_WALLET=0x3459B5703678c1D9E25f0c1E2b9d65d6bAF38369
      # THIRDWEB_SECRET_KEY lives in the Render dashboard (encrypted).
