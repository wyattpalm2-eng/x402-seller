name: keep-warm
# Keeps Render's free instance from sleeping (15-min idle -> ~50s cold start that
# an AI agent won't wait through). Pings /health every 5 min; each run retries
# through a cold start so it reliably wakes AND warms the box. Free + unlimited
# Action minutes because this repo is public.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
concurrency:
  group: keep-warm
  cancel-in-progress: true
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wake + warm /health (retry through cold start)
        run: |
          U="https://x402-seller-m8nx.onrender.com/health"
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "$U" || echo 000)
            echo "attempt $i -> $code"
            [ "$code" = "200" ] && { echo "warm"; exit 0; }
            sleep 10
          done
          echo "did not warm in time"; exit 1
