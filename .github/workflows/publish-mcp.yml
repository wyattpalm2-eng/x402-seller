name: Publish to MCP Registry

# Publishes x402-seller as a REMOTE MCP server to the official MCP Registry
# (registry.modelcontextprotocol.io), which PulseMCP / Glama / mcp.so ingest.
# It's a remote server, so there is NO npm package to publish, and auth is via
# GitHub Actions OIDC — no secrets, no interactive login, no cost.
# Trigger: push a version tag (git tag v1.0.0 && git push origin v1.0.0) or run
# it manually from the Actions tab. server.json must point at a LIVE /mcp URL.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for GitHub OIDC auth
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
