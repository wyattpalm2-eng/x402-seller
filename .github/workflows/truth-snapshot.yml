name: truth-snapshot

# Snapshots the Truth Engine's weather ledger into git every 6 hours.
# Same rationale as track-record-snapshot: (1) predictions survive Render
# redeploys (truth.ts loads data/truth_weather.jsonl on boot); (2) the ledger
# becomes a PUBLIC, git-timestamped history — a forecast can't be quietly
# rewritten after reality grades it.

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: truth-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch live rows and merge into the committed ledgers
        run: |
          set -e
          mkdir -p data
          # ledger pairs: live raw endpoint -> committed file
          for pair in "truth/weather/raw:data/truth_weather.jsonl" "truth/signal/raw:data/truth_signal.jsonl"; do
            ep="${pair%%:*}"; path="${pair#*:}"
            ok=""
            for i in 1 2 3 4 5 6; do
              if curl -fsS -m 60 "https://x402-seller-m8nx.onrender.com/${ep}" -o live.json; then ok=1; break; fi
              echo "attempt $i for ${ep} failed, waiting 20s"; sleep 20
            done
            [ -n "$ok" ] || { echo "${ep} unreachable — skipping"; continue; }
            LEDGER_PATH="$path" python3 - <<'PY'
          import json, os
          rows = {}
          path = os.environ["LEDGER_PATH"]
          if os.path.exists(path):
              for line in open(path):
                  line = line.strip()
                  if not line: continue
                  try:
                      r = json.loads(line)
                      if r.get("id"): rows[r["id"]] = r
                  except Exception:
                      pass
          live = json.load(open("live.json")).get("rows", [])
          for r in live:
              rid = r.get("id")
              if not rid: continue
              prev = rows.get(rid)
              # a graded row supersedes its pending self; never regress a grade
              if prev is None or (r.get("graded") and not prev.get("graded")):
                  rows[rid] = r
          out = sorted(rows.values(), key=lambda r: r.get("t", 0))[-6000:]
          with open(path, "w") as f:
              for r in out:
                  f.write(json.dumps(r) + "\n")
          print(f"{path} now {len(out)} rows")
          PY
            rm -f live.json
          done

      - name: Commit if changed
        run: |
          git config user.name "truth-bot"
          git config user.email "actions@github.com"
          git add data/truth_weather.jsonl data/truth_signal.jsonl
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "chore(truth): snapshot $(date -u +%FT%TZ)"
            git push
          fi
