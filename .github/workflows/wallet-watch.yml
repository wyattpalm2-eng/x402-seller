name: wallet-watch
# Emails Wyatt (by opening a GitHub issue) the FIRST time real USDC lands in the
# x402-seller wallet on Base. Fires once (drops a .paid marker). Also warms /health
# each run. Free on this public repo. ~hourly is plenty for a first-sale alert.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
permissions:
  contents: write
  issues: write
concurrency:
  group: wallet-watch
  cancel-in-progress: true
jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check wallet for first USDC payment (and warm the API)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          A=0x72B944dA66263bE35c2a2eDFeF5c525d58fa53Df
          USDC=0x833589fcd6edb6e08f4c7c32d4f71b54bda02913
          curl -s -o /dev/null --max-time 25 "https://x402-seller-m8nx.onrender.com/health" || true
          COUNT=$(curl -s --max-time 30 "https://base.blockscout.com/api/v2/addresses/$A/token-transfers?type=ERC-20&filter=to" | jq --arg u "$USDC" '[.items[]? | select(((.token.address // "") | ascii_downcase) == $u)] | length' 2>/dev/null || echo 0)
          echo "real USDC payments received so far: ${COUNT:-0}"
          if [ "${COUNT:-0}" -gt 0 ] && [ ! -f .paid ]; then
            echo "FIRST PAYMENT DETECTED"
            date -u > .paid
            git config user.name "wallet-watch"
            git config user.email "actions@users.noreply.github.com"
            git add .paid && git commit -m "first x402 payment detected" && git push
            gh issue create --title "First x402-seller payment landed" --body "@wyattpalm2-eng an AI agent just paid you in USDC on Base. Wallet: https://base.blockscout.com/address/$A — this is your first real x402 sale. 🎉" || true
          fi
